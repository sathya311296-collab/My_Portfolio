<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupees to dollar converter in JS</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
   <!-- <h1>Rupees to dollar converter</h1> -->
    <div id = "container">
        <h2 id = "heading">Rupees into dollar</h2>
        <div id = "input-box">
            <input type="text" id = "display" place holder ="rupees in dollar">
            </div>
            <div class ="button">
                <br><button onclick = "bclick()"> convert rupees into dollars</button>
        </div>
       <br><div id  ="result"></div>
    </div>
    <script>
 function bclick(){
    let displays = Number(document.getElementById("display").value);
 
//  rupees into dollar conversion formula cmvalue/2.54
let dollars  = displays/100;
console.log(displays);
let result =document.getElementById("result");
  result = result.textContent = dollars.toFixed(4) + "dollars";
 console.log("result");
 }
</script>

</body>
</html>
